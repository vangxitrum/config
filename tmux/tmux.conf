unbind r
bind r source-file ~/.config/tmux/tmux.conf

set-option -sg escape-time 10
set-option -g focus-events on
set-option -a terminal-features 'XXX:RGB'
set -g prefix C-s
set -g base-index 1
setw -g pane-base-index 1



# vim keymap
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# jump to the window referenced by the most recent x-tmux-target notification
bind-key g run-shell '~/work/config/scripts/tmux-jump-last-notify.sh'

bind-key b run-shell '~/work/config/scripts/tmux-jump-back.sh'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# dracula settings
set -s default-terminal 'tmux-256color'
set -g @dracula-show-powerline true
set -g @dracula-fixed-location "hochiminh"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-show-fahrenheit false
set -g status-position top

run '~/.config/tmux/plugins/tpm/tpm'

# pane styling: full border around each pane + dim inactive
set -g pane-border-lines heavy
set -g pane-active-border-style 'fg=#bd93f9'
set -g pane-border-style 'fg=#44475a'
set -g window-active-style 'fg=#f8f8f2,bg=default'
set -g window-style 'fg=#b0b8c8,bg=default'
